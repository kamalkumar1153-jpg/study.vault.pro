name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Install Native Android Builder
      run: |
        npm install -g @iobroker/legacy-cordova-builder || true
        npm install -g cordova

    - name: Configure App Framework
      run: |
        cordova platform add android --noscript || true
        mkdir -p platforms/android/app/src/main/assets/www
        cp -r www/* platforms/android/app/src/main/assets/www/ || true

    - name: Build Pure Debug APK
      run: |
        cd platforms/android || cd .
        ./gradlew assembleDebug --stacktrace || ./gradlew assembleDebug

    - name: Upload Testing Installer APK
      uses: actions/upload-artifact@v3
      with:
        name: Study-Vault-APK-Installer
        path: |
          **/build/outputs/apk/debug/*.apk
          platforms/android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
