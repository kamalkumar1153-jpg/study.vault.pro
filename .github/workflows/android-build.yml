name: Build Android App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up NodeJS (Version 22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Project Dependencies
        run: |
          npm install

      - name: Add and Sync Android Platform
        run: |
          # Cloud par fresh android directory structure create karein
          npx cap add android || true
          npx cap sync android

      - name: Build App Bundle (.aab) via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Upload Finished App Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Study-Vault-Pro-Bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
