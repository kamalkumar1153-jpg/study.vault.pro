name: Build Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Setup Node & Cordova Core
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Cordova CLI Tools
      run: npm install -g cordova

    - name: Inject Android Core Platform
      run: |
        cordova platform remove android || true
        cordova platform add android --nosave || true

    - name: Build Standalone Debug APK Installer
      run: cordova build android --debug || echo "Build failed but continuing to track paths"

    - name: Upload Study Vault APK Installer
      uses: actions/upload-artifact@v3
      with:
        name: Study-Vault-APK-Installer
        path: |
          platforms/android/app/build/outputs/apk/debug/app-debug.apk
          platforms/android/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
