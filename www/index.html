<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Vault Pro - NEET Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --bg-color: #f8fafc;
            --card-color: #ffffff;
            --text-dark: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-box: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding-bottom: 60px;
        }

        /* Top Header */
        .header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            padding: 20px;
            border-bottom-right-radius: 25px;
            border-bottom-left-radius: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Overall Progress Tracker */
        .overall-progress-card {
            background: var(--card-color);
            margin: -15px 15px 20px 15px;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .progress-bar-container {
            background-color: #e2e8f0;
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #10b981, #059669);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* Subject Tab Switcher */
        .subject-tabs {
            display: flex;
            justify-content: space-around;
            margin: 15px;
            background: #e2e8f0;
            padding: 5px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            font-weight: 600;
            color: #64748b;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--card-color);
            color: var(--primary-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* Container Main */
        .main-container {
            padding: 10px 15px;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* Chapter Cards styling */
        .chapter-card {
            background: var(--card-color);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
        }

        .chapter-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .chapter-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }

        .btn-formula { background: #eff6ff; color: var(--primary-color); }
        .btn-test { background: var(--primary-color); color: white; }

        /* NEET Quiz Engine Overlays */
        .quiz-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .quiz-header {
            background: #0f172a;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer-badge {
            background: var(--danger-color);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .question-box {
            padding: 20px;
            background: white;
            margin: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            flex-grow: 1;
            overflow-y: auto;
        }

        .option-card {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-card.selected {
            border-color: var(--primary-color);
            background: #eff6ff;
        }

        .quiz-footer {
            padding: 15px;
            background: white;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #e2e8f0;
        }

        /* Formula Modal View */
        .modal-view {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            z-index: 999;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .formula-item {
            background: #f1f5f9;
            padding: 15px;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .close-btn {
            align-self: flex-end;
            background: #64748b;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            border: none;
            margin-bottom: 15px;
        }

        /* Scorecard */
        .scorecard {
            text-align: center;
            padding: 40px 20px;
        }

        .score-metric {
            font-size: 48px;
            color: var(--primary-color);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Study Vault Pro</h2>
        <p style="font-size: 12px; opacity: 0.8;">NEET & Board Exam Preparation Dashboard</p>
    </div>

    <div class="overall-progress-card">
        <div class="progress-info">
            <span>Overall Syllabus Mastered</span>
            <span id="progress-text">0%</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="main-progress"></div>
        </div>
    </div>

    <div class="subject-tabs">
        <button class="tab-btn active" onclick="switchSubject('physics')">Physics</button>
        <button class="tab-btn" onclick="switchSubject('chemistry')">Chemistry</button>
        <button class="tab-btn" onclick="switchSubject('biology')">Biology</button>
    </div>

    <div class="main-container">
        <div id="physics" class="view-section active"></div>
        <div id="chemistry" class="view-section"></div>
        <div id="biology" class="view-section"></div>
    </div>

    <div id="formula-panel" class="modal-view">
        <button class="close-btn" onclick="closeFormulaPanel()"><i class="fa fa-times"></i> Close Sheet</button>
        <h3 id="panel-title" style="margin-bottom: 15px;">Formulas</h3>
        <div id="formula-content-target"></div>
    </div>

    <div id="quiz-engine" class="quiz-container">
        <div class="quiz-header">
            <span id="quiz-title" style="font-weight:600;">NEET Mock Practice</span>
            <div class="timer-badge"><i class="fa fa-clock"></i> <span id="clock">10:00</span></div>
        </div>
        
        <div class="question-box" id="question-arena">
            </div>

        <div class="quiz-footer">
            <button class="btn" style="background:#64748b; color:white; max-width:100px;" onclick="exitQuiz()">Quit</button>
            <button class="btn btn-test" style="max-width:150px;" id="next-submit-btn" onclick="processNextQuestion()">Next Question</button>
        </div>
    </div>

    <script>
        // Core NEET/RBSE Database Setup
        const appDatabase = {
            physics: [
                {
                    id: "p1",
                    title: "Chapter 1: Electric Charges and Fields",
                    formulas: [
                        "Coulomb's Law: F = k * (q1 * q2) / r²",
                        "Electric Field Strength: E = F / q",
                        "Electric Dipole Moment: p = q * 2a",
                        "Gauss's Theorem Flux: Φ = Q / ε₀"
                    ],
                    questions: [
                        { q: "What is the SI unit of electric charge?", o: ["Coulomb", "Newton", "Farad", "Ampere"], a: 0 },
                        { q: "The value of permittivity of free space (ε₀) is:", o: ["9 x 10⁹ N m²/C²", "8.85 x 10⁻¹² C²/N m²", "1.6 x 10⁻¹⁹ C", "9 x 10⁻¹¹ C²/N m²"], a: 1 }
                    ]
                }
            ],
            chemistry: [
                {
                    id: "c1",
                    title: "Chapter 1: Solutions",
                    formulas: [
                        "Molarity (M): Moles of Solute / Volume of Solution (L)",
                        "Molality (m): Moles of Solute / Mass of Solvent (kg)",
                        "Raoult's Law: P_solution = X_solvent * P°_solvent",
                        "Osmotic Pressure (π): π = iCRT"
                    ],
                    questions: [
                        { q: "Which of the following concentration units depends on temperature?", o: ["Molality", "Molarity", "Mole fraction", "Weight percentage"], a: 1 }
                    ]
                }
            ],
            biology: [
                {
                    id: "b1",
                    title: "Chapter 1: Sexual Reproduction in Flowering Plants",
                    formulas: [
                        "💡 Tip: Focus deeply on Double Fertilization structure and Diagram based Embryo Sac labelings.",
                        "Pollen grain development steps: Microsporogenesis -> 2-celled stage (Vegetative + Generative)"
                    ],
                    questions: [
                        { q: "The functional megaspore undergoes how many mitotic divisions to form a mature embryo sac?", o: ["One", "Two", "Three", "Four"], a: 2 }
                    ]
                }
            ]
        };

        // User Tracker System Saved in Native Memory
        let trackingData = JSON.parse(localStorage.getItem('study_vault_track')) || {};

        function renderDashboard() {
            ['physics', 'chemistry', 'biology'].forEach(subject => {
                const zone = document.getElementById(subject);
                zone.innerHTML = '';
                
                appDatabase[subject].forEach(ch => {
                    const status = trackingData[ch.id] ? `<span style="color:var(--success-color); font-size:12px;"><i class="fa fa-check-circle"></i> Passed (${trackingData[ch.id]}%)</span>` : `<span style="color:#64748b; font-size:12px;"><i class="fa fa-circle"></i> Pending</span>`;
                    
                    const card = document.createElement('div');
                    card.className = 'chapter-card';
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div class="chapter-title">${ch.title}</div>
                            ${status}
                        </div>
                        <div class="chapter-actions">
                            <button class="btn btn-formula" onclick="openFormulas('${subject}', '${ch.id}')"><i class="fa fa-book-open"></i> Concept Sheet</button>
                            <button class="btn btn-test" onclick="startNeetQuiz('${subject}', '${ch.id}')"><i class="fa fa-pen-to-square"></i> NEET Test</button>
                        </div>
                    `;
                    zone.appendChild(card);
                });
            });
            updateProgressBar();
        }

        function switchSubject(sub) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(sub).classList.add('active');
        }

        function updateProgressBar() {
            const totalChapters = appDatabase.physics.length + appDatabase.chemistry.length + appDatabase.biology.length;
            const completed = Object.keys(trackingData).length;
            const percentage = totalChapters > 0 ? Math.round((completed / totalChapters) * 100) : 0;
            
            document.getElementById('main-progress').style.width = percentage + '%';
            document.getElementById('progress-text').innerText = percentage + '%';
        }

        function openFormulas(subject, chId) {
            const chapter = appDatabase[subject].find(c => c.id === chId);
            document.getElementById('panel-title').innerText = chapter.title + " - Formulas";
            const target = document.getElementById('formula-content-target');
            target.innerHTML = '';
            
            chapter.formulas.forEach(f => {
                const div = document.createElement('div');
                div.className = 'formula-item';
                div.innerText = f;
                target.appendChild(div);
            });
            document.getElementById('formula-panel').style.display = 'flex';
        }

        function closeFormulaPanel() {
            document.getElementById('formula-panel').style.display = 'none';
        }

        // --- Premium Test Engine Logic with NEET Negative Marking System (+4 / -1) ---
        let currentQuizData = [];
        let currentQIdx = 0;
        let selectedOption = null;
        let score = 0;
        let quizTimer = null;
        let timeLeft = 600; 
        let activeChId = "";

        function startNeetQuiz(subject, chId) {
            const chapter = appDatabase[subject].find(c => c.id === chId);
            currentQuizData = chapter.questions;
            if(!currentQuizData || currentQuizData.length === 0) {
                alert("This chapter mockup test will be operational shortly!");
                return;
            }
            activeChId = chId;
            currentQIdx = 0;
            score = 0;
            timeLeft = 600; 
            
            document.getElementById('quiz-engine').style.display = 'flex';
            startClockCounter();
            loadQuestion();
        }

        function startClockCounter() {
            clearInterval(quizTimer);
            quizTimer = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('clock').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                
                if(timeLeft <= 0) {
                    clearInterval(quizTimer);
                    evaluateFinalScore();
                }
            }, 1000);
        }

        function loadQuestion() {
            selectedOption = null;
            const qData = currentQuizData[currentQIdx];
            const arena = document.getElementById('question-arena');
            
            document.getElementById('next-submit-btn').innerText = (currentQIdx === currentQuizData.length - 1) ? "Submit Test" : "Next Question";
            
            arena.innerHTML = `
                <p style="font-size:14px; color:#64748b; margin-bottom:5px;">Question ${currentQIdx + 1} of ${currentQuizData.length}</p>
                <h3 style="margin-bottom:20px; font-weight:600;">${qData.q}</h3>
                <div id="options-block"></div>
            `;
            
            const optBlock = document.getElementById('options-block');
            qData.o.forEach((opt, index) => {
                const optCard = document.createElement('div');
                optCard.className = 'option-card';
                optCard.innerText = opt;
                optCard.onclick = () => {
                    document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    optCard.classList.add('selected');
                    selectedOption = index;
                };
                optBlock.appendChild(optCard);
            });
        }

        function processNextQuestion() {
            if(selectedOption === null) {
                alert("Please select an option before moving forward!");
                return;
            }

            // NEET Evaluation Formula Rule Set (+4 Correct, -1 Incorrect)
            if(selectedOption === currentQuizData[currentQIdx].a) {
                score += 4;
            } else {
                score -= 1;
            }

            if(currentQIdx < currentQuizData.length - 1) {
                currentQIdx++;
                loadQuestion();
            } else {
                clearInterval(quizTimer);
                evaluateFinalScore();
            }
        }

        function evaluateFinalScore() {
            const arena = document.getElementById('question-arena');
            const maxScore = currentQuizData.length * 4;
            const percentage = Math.max(0, Math.round((score / maxScore) * 100));
            
            // Native Memory me score tracking block add
            trackingData[activeChId] = percentage;
            localStorage.setItem('study_vault_track', JSON.stringify(trackingData));
            
            arena.innerHTML = `
                <div class="scorecard">
                    <i class="fa fa-award" style="font-size:64px; color:#eab308; margin-bottom:15px;"></i>
                    <h2>Test Completed!</h2>
                    <p style="color:#64748b; margin-top:5px; margin-bottom:20px;">NEET Scoring Metric Applied (+4 / -1)</p>
                    <div class="score-metric">${score} / ${maxScore}</div>
                    <p style="font-weight:500; margin-top:10px;">Accuracy: ${percentage}%</p>
                    <button class="btn btn-test" style="margin-top:30px; max-width:200px;" onclick="exitQuiz()">Back to Dashboard</button>
                </div>
            `;
            document.getElementById('next-submit-btn').style.display = 'none';
        }

        function exitQuiz() {
            clearInterval(quizTimer);
            document.getElementById('quiz-engine').style.display = 'none';
            document.getElementById('next-submit-btn').style.display = 'block';
            renderDashboard();
        }

        // Initialize App on Startup
        renderDashboard();
    </script>
</body>
</html>
