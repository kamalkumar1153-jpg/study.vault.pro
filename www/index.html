<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Vault Pro</title>
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f7f6; color: #333; padding-bottom: 30px; }
        .header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 25px 20px; border-bottom-right-radius: 25px; border-bottom-left-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .main-container { padding: 15px; }
        .overall-progress-card { background: white; margin: -15px 15px 20px 15px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; }
        .progress-bar-container { background-color: #e2e8f0; border-radius: 10px; height: 14px; overflow: hidden; margin-top: 10px; }
        .progress-bar { background: linear-gradient(90deg, #10b981, #059669); height: 100%; width: 0%; transition: width 0.5s ease; }
        .subject-tabs { display: flex; justify-content: space-around; margin-bottom: 15px; background: #cbd5e1; padding: 6px; border-radius: 14px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: 700; color: #475569; border-radius: 10px; cursor: pointer; transition: 0.3s; text-align: center; }
        .tab-btn.active { background: white; color: #1e3a8a; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .chapter-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        .chapter-title { font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 12px; }
        .chapter-actions { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; text-align: center; transition: 0.2s; }
        .btn-formula { background: #eff6ff; color: #1e40af; }
        .btn-test { background: #f0fdf4; color: #166534; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Study Vault Pro</h2>
        <p style="font-size: 12px; opacity: 0.9; margin-top: 5px;">Class 12th Board & NEET Edition</p>
    </div>

    <div class="overall-progress-card">
        <span style="font-weight: 600; color: #475569;">Syllabus Target Mastered: <span id="progress-text">0%</span></span>
        <div class="progress-bar-container">
            <div id="main-progress" class="progress-bar"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="subject-tabs">
            <button class="tab-btn active" onclick="switchSubject('physics')">Physics</button>
            <button class="tab-btn" onclick="switchSubject('chemistry')">Chemistry</button>
        </div>

        <div id="physics" class="view-section active"></div>
        <div id="chemistry" class="view-section"></div>
    </div>

    <script>
        const appDatabase = {
            physics: [
                { id: "p1", title: "Chapter 1: Electric Charges and Fields" },
                { id: "p2", title: "Chapter 2: Electrostatic Potential and Capacitance" }
            ],
            chemistry: [
                { id: "c1", title: "Chapter 1: Solutions & Colligative Properties" },
                { id: "c2", title: "Chapter 2: Electrochemistry" }
            ]
        };

        function renderDash() {
            ['physics', 'chemistry'].forEach(subject => {
                const zone = document.getElementById(subject);
                zone.innerHTML = '';
                appDatabase[subject].forEach(ch => {
                    const card = document.createElement('div');
                    card.className = 'chapter-card';
                    card.innerHTML = '<div class="chapter-title">' + ch.title + '</div>' +
                                     '<div class="chapter-actions">' +
                                     '<button class="btn btn-formula" onclick="alert(\'Formula Sheet Coming Soon!\')">Formula Sheet</button>' +
                                     '<button class="btn btn-test" onclick="alert(\'NEET Mock Test Panel Active!\')">Mock Test</button>' +
                                     '</div>';
                    zone.appendChild(card);
                });
            });
        }

        function switchSubject(subjectId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(subjectId).add('active');
        }

        window.onload = function() {
            renderDash();
            document.getElementById('main-progress').style.width = '25%';
            document.getElementById('progress-text').innerText = '25%';
        };
    </script>
</body>
</html>
